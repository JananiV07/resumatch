services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # URL the browser uses to reach the API (baked at build time)
        VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
